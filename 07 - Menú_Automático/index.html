<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Menú | El Capibara Azul</title>
</head>
<body>
 
 
    <h1>☕ Menú Digital</h1>
    
    <main id="galeria"></main>

    <script>
        // 1. LA BASE DE DATOS (El Arreglo de Objetos)
        let productosCapibara = [
            {
                nombre: "Capuchino Clásico",
                precio: 55,
                categoria: "Bebida caliente",
                imagen: "https://images.unsplash.com/photo-1534778101976-62847782c213?w=300&q=80"
            },
            {
                nombre: "Frappé de Matcha",
                precio: 85,
                categoria: "Bebida frío",
                imagen: "https://www.coffeetech.com/media/img/products/secondary/Distribuidor-matcha-latte-vitazen-frappe.webp"
            },
            {
                nombre: "Panini de Tres Quesos",
                precio: 120,
                categoria: "Alimentos",
                imagen: "https://images.unsplash.com/photo-1528735602780-2552fd46c7af?w=300&q=80"
            },
             {
                nombre: "Matcha Latte",
                precio: 90,
                categoria: "Bebida fría",
                imagen: "https://preppykitchen.com/wp-content/uploads/2025/02/Iced-Matcha-Latte-Feature.jpg"
            },

            {
                nombre: "Croissant sencillo",
                precio: 55,
                categoria: "Alimentos",
                imagen: "https://soloporgusto.com/wp-content/uploads/2025/01/Croissant-tradicional.jpg"
            },
        ];
 
 
        // 2. EL CONTENEDOR (Donde vamos a pintar)
        
 
 
        // 3. TU MISIÓN: Escribe el ciclo forEach aquí abajo para imprimir las 3 tarjetas en pantalla
        // RECUERDA: Usa contenedor.innerHTML += ` HTML AQUÍ `;
        
        productosCapibara.forEach(function(item){
            let tarjeta = `
            <div class = "tarjeta">
            <div>
                <h3>${item.nombre}</h3>
                <p>${item.precio}MXN</p>
                <p>${item.categoria}</p>
                <img src=${item.imagen}>
            </div>
        </div>
        `;

        let contenedorProductosCapibara = document.getElementById("galeria");
        contenedorProductosCapibara.innerHTML += tarjeta;
        });
    

 
    </script>

     </body>

</html>
