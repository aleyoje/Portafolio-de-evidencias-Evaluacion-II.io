<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="02EstilosAvan.css">
    <title>Reto Canvas: Estilos y Fusión</title>
</head>
<body>

    <h2>Laboratorio de Apariencia y Color</h2>
    <p>Aplica Degradados, Resplandores y Modos de Fusión a estas formas.</p>
    
    <canvas id="lienzo" width="600" height="400"></canvas>

    <script>
        const canvas = document.getElementById('lienzo');
        const ctx = canvas.getContext('2d');

        // ==========================================
        // RETO 1: SOMBRAS (Resplandor / Glow)
        // ==========================================
        // PISTA PARA EXPOSITORES: Descomenten estas líneas y jueguen con los valores
        
          ctx.shadowBlur = 100; // ¿Qué tan difuminada es la sombra?
          ctx.shadowColor = "magenta"; // Color del resplandor

        // ==========================================
        // RETO 2: LOS MODOS DE FUSIÓN (Photoshop en Código)
        // ==========================================
        // PISTA: Por defecto es "source-over" (Uno encima del otro). 
        // Cámbienlo a "screen", "multiply", "overlay" o "destination-out".
        
        // ctx.globalCompositeOperation = "source-over";
        // ctx.globalCompositeOperation = "screen";
        // ctx.globalCompositeOperation = "overlay";

        // ==========================================
        // RETO 3: DEGRADADOS (Gradients)
        // ==========================================
        // PISTA: Creen un gradiente lineal. Las coordenadas son (X_inicio, Y_inicio, X_fin, Y_fin)
        
         let miGradiente1 = ctx.createLinearGradient(0, 0, 0, 300);
        miGradiente1.addColorStop(0.8, "magenta"); // Color al 0%
        miGradiente1.addColorStop(1, "cyan");    // Color al 100%

        let miGradiente2 = ctx.createLinearGradient(100, 100, 300, 300);
        miGradiente2.addColorStop(0, "cyan"); // Color al 0%
        miGradiente2.addColorStop(1, "yellow");    // Color al 100%
        

        // --- DIBUJO DEL PRIMER CÍRCULO ---
        ctx.beginPath();
        ctx.arc(250, 200, 100, 0, Math.PI * 2);
        
        // ¡RETO! Cambien este color plano por su variable 'miGradiente'
         ctx.fillStyle = "red"; 
        //ctx.fillStyle = miGradiente1;
        ctx.fill();

        // ctx.globalCompositeOperation = "destination-out";
        // ctx.globalCompositeOperation = "multiply";
         //ctx.globalCompositeOperation = "source-over";
         ctx.globalCompositeOperation = "screen";
        //ctx.globalCompositeOperation = "overlay";
        // globalCompositeOperation Esta propiedad define o devuelve cómo se dibuja un origen sobre un destino.
        // Origen = Dibujos que se van a dibujar en el lienzo.
        // Destino = Dibujos que ya están dibujados en el lienzo.
        // --- DIBUJO DEL SEGUNDO CÍRCULO ---
        
        ctx.beginPath();
        ctx.arc(350, 200, 100, 0, Math.PI * 2);
        
        // ¡RETO! Creen otro gradiente o usen un color distinto para ver cómo se mezclan en el centro
        ctx.fillStyle = "blue";
        // ctx.fillStyle = "yellow";
        //ctx.fillStyle = miGradiente2;
        ctx.fill();

    </script>
</body>
</html>
