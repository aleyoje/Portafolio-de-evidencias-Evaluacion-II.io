<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+NZ+Guides&display=swap" rel="stylesheet">

    <title>Inspiración Asíncrona</title>
</head>
<body>
 
 
    <div id="frase-contenedor">
        <h1 id="texto-frase">"Haz clic para encontrar inspiración"</h1>
        <p id="autor-frase"></p>
    </div>
 
 
    <button id="btn-inspirar" onclick="obtenerFrase()">✨ Dame una frase</button>
 
 
    <script>
        function obtenerFrase() {
            const boton = document.getElementById("btn-inspirar");
            const texto = document.getElementById("texto-frase");
            
            // UX: Desactivar botón mientras esperamos
            boton.innerHTML = "Buscando inspiración...";
            boton.style.backgroundColor = "#CA6180";
            boton.disabled = true;
 
 
            // API de frases célebres (en inglés, pero sirve para el ejemplo)
            fetch('http://api.quotable.io/random')
                .then(response => response.json())
                .then(data => {
                    // Actualizamos el diseño con los datos reales
                    texto.innerHTML = `"${data.content}"`;
                    document.getElementById("autor-frase").innerHTML = `- ${data.author}`;
                    
                    texto.classList.add("frase-fancy");
                    //texto.innerHTML.classList("frase-fancy");
                    
                    // Restauramos el botón
                    boton.innerHTML = "✨ Dame otra frase";
                    boton.style.backgroundColor = "#0077b6";
                    //texto.classList.remove("frase-fancy");
                    boton.disabled = false;
                })
                .catch(error => {
                    texto.innerHTML = "Hubo un error en la conexión.";
                    boton.disabled = false;
                });
        }
    </script>
</body>
</html>
