<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Reto Integrador: ID Aumentada</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&display=swap" rel="stylesheet">
</head>

<body>

        <audio id="sonido-scan" src="beep_short.ogg"></audio>

    <div class="credencial">
        <canvas id="holograma" width="100" height="100"></canvas>

        <div id="estado-carga">
            <div class="skeleton" style="width: 100px; height: 100px; border-radius: 50%;"></div>
            <div class="skeleton" style="width: 80%; height: 20px; margin-top: 15px;"></div>
            <div class="skeleton" style="width: 50%; height: 15px; margin-top: 10px;"></div>
        </div>

        <div id="estado-listo" class="oculto">

            <img id="avatar-img" src="" alt="Avatar">
            
            <p class="dato-label">NOMBRE DE ACCESO</p>
            <p class="dato-valor" id="txt-nombre">---</p>
            
            <p class="dato-label">ORIGEN / BASE</p>
            <p class="dato-valor" id="txt-origen">---</p>

            <p class="dato-label">COORDENADAS DE ACCESO (GPS)</p>
            <p class="dato-valor" id="txt-gps">Calculando...</p>
        </div>

    <button onclick="iniciarEscaneo()">Generar Identidad</button>

    <script>
        function iniciarEscaneo() {
            // 1. Mostrar estado de carga
            document.getElementById("estado-carga").classList.remove("oculto");
            document.getElementById("estado-listo").classList.add("oculto");

             function activarAudio() {

                            const sonido = document.getElementById("sonido-scan");
                            sonido.muted = false;
                            sonido.play();
                        }

            // ==========================================
            // RETO 2: FETCH API Y DATOS (Semanas 7 y 10)
            // ==========================================
            fetch('https://randomuser.me/api/')
                .then(respuesta => respuesta.json())
                .then(datos => {
                    let usuario = datos.results[0]; // El objeto principal

                    // 👇 INYECTA LOS DATOS EN EL DOM
                    // Tip: usa usuario.picture.large, usuario.name.first, usuario.location.country
                    
                    document.getElementById("avatar-img").src = usuario.picture.large;
                    document.getElementById("txt-nombre").textContent = usuario.name.first + " " + usuario.name.last;
                    document.getElementById("txt-origen").textContent = usuario.location.city + ", " + usuario.location.country;

                    // ficha.innerHTML = ` 
                    // <div>
                    //     <h1 class = "dato-label">${usuario.name.first} ${usuario.name.last}</h1>
                    //     <h3> Ciudad: ${usuario.location.city}</h3>
                    //     <h3> Estado: ${usuario.location.country}</h3>
                    //     <img id = "avatar-img" src="${usuario.picture.large}">
                    // </div>

                    //     `;
                    
                    // Mostramos la interfaz lista
                    document.getElementById("estado-carga").classList.add("oculto");
                    document.getElementById("estado-listo").classList.remove("oculto");

                    // ==========================================
                    // RETO 5: AUDIO (Semana 9)
                    // ==========================================
                    // 👇 Reproduce el sonido de la etiqueta <audio>
                    activarAudio();
                        
                    // Lanzamos funciones secundarias
                    obtenerUbicacion();
                    dibujarHolograma();
                })
                .catch(error => alert("Error de conexión en el servidor principal."));
        }

        // ==========================================
        // RETO 3: GEOLOCALIZACIÓN (Semana 9)
        // ==========================================
        function obtenerUbicacion() {
         
         const CoorContenedor = document.getElementById ("txt-gps");

        CoorContenedor.textContent = "Analizando coordenandas";
        

         navigator.geolocation.getCurrentPosition(exito,rechazo)


     function exito(position) {

         const longitud = position.coords.longitude;
         const latitud = position.coords.latitude;

         CoorContenedor.textContent = "Latitud:  " + latitud + " Longitud: " + longitud;
        

     }

      function rechazo() {
        CoorContenedor.textContent = "Acceso a ubicación rechazada";
      }
    }

        // ==========================================
        // RETO 4: CANVAS (Semana 8)
        // ==========================================
        function dibujarHolograma() {
            const canvas = document.getElementById("holograma");
            const ctx = canvas.getContext("2d");

            //ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "blue";
            ctx.lineWidth = 5;

            ctx.beginPath();
            ctx.arc(50, 50, 40, 0, 2 * Math.PI);
    
            ctx.stroke();
            
        }
    </script>

</body>
</html>
